<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('paise.webp') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #ffffff;
      border-radius: 600px;
      padding: 70px 70px;
      width: 90%;
      max-width: 600px;
      min-height: 420px;
      box-shadow: 0 10px 25px rgba(90, 87, 87, 0.2);
      text-align: center;
      color: #7a7a7a;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      margin-bottom: 15px;
    }

    .logo {
      font-size: 2.8rem;
      animation: rotate 5s linear infinite;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 2.4rem;
      color: #2b3c4e;
      margin: 0;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #555;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 35px;
      flex-wrap: wrap;
      margin-top: 60px;
    }

    a {
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 12px;
      background: linear-gradient(135deg, #08dceb, #e84ed68d, rgb(236, 172, 94));
      color: #000000;
      font-weight: bold;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    a:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        min-height: 380px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .logo {
        font-size: 2.2rem;
      }

      .button-group {
        flex-direction: column;
        gap: 15px;
      }

      .title-row {
        flex-direction: column;
        gap: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-row">
      <div class="logo">💵</div>
      <h1>EXPENSE TRACKER</h1>
    </div>
    <p>Track your expenses effortlessly.</p>
    <div class="button-group">
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </div>
  </div>
</body>
</html>
