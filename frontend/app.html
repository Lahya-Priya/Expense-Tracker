<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ✅ Top Button -->
  <div class="top-buttons">
    <button id="logout-btn" class="logout-btn">Logout</button>
  </div>

  <div class="container">
    <h2>💸 Expense Tracker</h2>

    <!-- ✅ Welcome User -->
    <h3 id="welcome-message"></h3>

    <!-- ✅ Balance Section -->
    <div class="balance-section">
      <h3>Current Balance</h3>
      <h1 id="balance">₹0.00</h1>
    </div>

    <!-- ✅ Income & Expense Containers -->
    <div class="transaction-container">

      <!-- ✅ Income Section -->
      <div class="income-container">
        <h3>Add Income</h3>
        <form id="income-form">
          <div class="form-control">
            <label for="income-text">Description</label>
            <input type="text" id="income-text" placeholder="Enter income source..." list="suggestions" required pattern="[A-Za-z\s]+" title="Only letters are allowed">
          </div>
          <div class="form-control">
            <label for="income-amount">Amount</label>
            <input type="number" id="income-amount" placeholder="Enter amount..." step="0.01" min="0" required>
          </div>
          <div class="form-control">
            <label for="income-date">Date</label>
            <input type="date" id="income-date">
          </div>
          <button type="submit" class="btn">Add Income</button>
        </form>
        <h4>Total Income: <span id="money-plus" class="money plus">+₹0.00</span></h4>
      </div>

      <!-- ✅ Expense Section -->
      <div class="expense-container">
        <h3>Add Expense</h3>
        <form id="expense-form">
          <div class="form-control">
            <label for="expense-text">Description</label>
            <input type="text" id="expense-text" placeholder="Enter expense category..." list="suggestions" required pattern="[A-Za-z\s]+" title="Only letters are allowed">
          </div>
          <div class="form-control">
            <label for="expense-amount">Amount</label>
            <input type="number" id="expense-amount" placeholder="Enter amount..." step="0.01" min="0" required>
          </div>
          <div class="form-control">
            <label for="expense-date">Date</label>
            <input type="date" id="expense-date">
          </div>
          <button type="submit" class="btn">Add Expense</button>
        </form>
        <h4>Total Expense: <span id="money-minus" class="money minus">-₹0.00</span></h4>
      </div>

    </div>

    <!-- ✅ Suggested Transactions -->
    <datalist id="suggestions">
      <option value="Salary">
      <option value="Freelancing">
      <option value="Investment">
      <option value="Rent">
      <option value="Grocery">
      <option value="Shopping">
      <option value="Bills">
      <option value="Food">
      <option value="Entertainment">
      <option value="Fuel">
    </datalist>

    <!-- ✅ Transaction History -->
    <div class="history-section">
      <h3>Transaction History</h3>
      <ul id="history-list" class="list"></ul>
    </div>
  </div>

  <!-- ✅ Scripts -->
  <script>
    // Logout
    document.getElementById('logout-btn').addEventListener('click', function () {
      localStorage.removeItem('token');  
      localStorage.removeItem('username'); 
      localStorage.removeItem('isLoggedIn'); 

      alert('Logged out successfully!');
      window.location.href = 'login.html'; 
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
